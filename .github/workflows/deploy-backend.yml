name: Deploy Backend

on:
  workflow_run:
    workflows:
      - Build Backend
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION_NAME }}
  ECR_BACKEND: ${{ secrets.ECR_BACKEND_URL }}

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build e push
        run: |
          docker build -t $ECR_BACKEND:latest -t $ECR_BACKEND:${{ github.sha }} ./backend
          docker push $ECR_BACKEND:latest
          docker push $ECR_BACKEND:${{ github.sha }}
      - name: Deploy no ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service ${{ secrets.ECS_BACKEND_SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
