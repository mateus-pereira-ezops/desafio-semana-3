apiVersion: 1
groups:
  - orgId: 1
    name: todo-api
    folder: alerts
    interval: 10s
    rules:
      - uid: service-down
        title: ServiceDown
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: your_id
            model:
              expr: 'up{job="todo-api"}'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: classic_conditions
              conditions:
                - evaluator:
                    type: eq
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
                  query:
                    params:
                      - A
        noDataState: NoData
        execErrState: Error
        for: 15s
        annotations:
          summary: Todo API está fora do ar
          description: O serviço não responde há mais de 15 segundos.
        labels:
          severity: critical
      - uid: high-error-rate
        title: HighErrorRate
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: your_id
            model:
              expr: >-
                rate(http_requests_total{status_code=~"5.."}[1m]) /
                rate(http_requests_total[1m])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: classic_conditions
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.05
                  operator:
                    type: and
                  reducer:
                    type: last
                  query:
                    params:
                      - A
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: Taxa de erros 5xx acima de 5%
          description: Mais de 5% das requisições estão retornando erro.
        labels:
          severity: warning
      - uid: high-memory
        title: HighMemoryUsage
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: your_id
            model:
              expr: 'process_resident_memory_bytes{job="todo-api"}'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: classic_conditions
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 157286400
                  operator:
                    type: and
                  reducer:
                    type: last
                  query:
                    params:
                      - A
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Memória alta na Todo API
          description: Uso de memória acima de 150MB.
        labels:
          severity: warning
