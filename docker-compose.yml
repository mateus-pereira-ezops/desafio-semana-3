services:
  app:
    build: ./frontend
    ports:
      - 3000:3000
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    depends_on:
      db:
        condition: service_started
    networks:
      - internal-net

  backend:
    build: ./backend
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: mateus
      DB_PASS: mypassword
      DB_NAME: mydb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal-net

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    ports:
      - 5432:5432
    networks:
      - internal-net
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - db-data:/var/lib/postgresql/data

networks:
  internal-net:
    driver: bridge

volumes:
  db-data:
