services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - internal-net

  frontend:
    build: ./frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      db:
        condition: service_started
    networks:
      - internal-net

  backend:
    build: ./backend
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: mateus
      DB_PASS: mypassword
      DB_NAME: mydb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal-net

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    ports:
      - 5432:5432
    networks:
      - internal-net
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - db-data:/var/lib/postgresql/data

networks:
  internal-net:
    driver: bridge

volumes:
  db-data:
